<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Кабинет администратора</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <span class="brand-badge"></span>
      <span>Прогноз</span>
    </a>

    <nav>
      <a href="index.html">Главная</a>
      <a href="updates.html">Обновления</a>
      <a href="account.html">Кабинет</a>
      <a href="admin.html" class="active">Админ</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="grid">

    <div class="card glow span5">
      <h1>Кабинет администратора</h1>

      <div id="adminInfo" class="out">
        Проверка доступа...
      </div>

      <div class="actions">
        <button class="btn" id="btnLogout">Выйти</button>
      </div>
    </div>

    <div class="card span7">
      <h2>Добавить обновление данных</h2>

      <label>Дата обновления</label>
      <input id="updateDate" placeholder="2026-05-17">

      <label>Показатели через запятую</label>
      <input id="updateIndicators" placeholder="ВРП, инфляция, безработица">

      <label>Источник</label>
      <input id="updateSource" placeholder="Росстат">

      <button class="btn btn-wide" id="btnAddUpdate">
        Добавить обновление
      </button>

      <div id="updateStatus" class="out">
        Заполните форму
      </div>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
